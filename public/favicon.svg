<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 다크 네이비 라운드 배경 (브랜드 토큰 #010828) -->
  <rect width="64" height="64" rx="14" fill="#010828"/>

  <!-- 우주 분위기 — 살짝의 라디얼 글로우 -->
  <defs>
    <radialGradient id="g" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#010828" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#g)"/>

  <!-- "Q" — 흰 cream 톤, 두꺼운 sans (폰트 의존 X, 패스 문자) -->
  <text
    x="50%"
    y="58%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Noto Sans KR', system-ui, -apple-system, sans-serif"
    font-size="42"
    font-weight="900"
    fill="#EFF4FF"
    letter-spacing="-1"
  >Q</text>

  <!-- 브랜드 neon dot — 우측 하단 . 구분자 -->
  <circle cx="49" cy="46" r="4.2" fill="#6FFF00">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
